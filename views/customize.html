<div class="view-settings">

    <div class="settings-section">
        <h2 class="settings-section-title">Display</h2>
        <div class="setting-row">
            <button class="btn" id="setting-rank-colors">Rank Colors</button>
            <button class="btn" id="setting-rank-icons">Rank Icons</button>
            <button class="btn" id="setting-hero-names">Hero Names</button>
            <button class="btn" id="setting-hero-level">Hero Levels</button>
        </div>
    </div>

    <div class="settings-section">
        <h2 class="settings-section-title">Theme</h2>

        <div id="theme-group-colors">
            <p class="settings-group-label">Chromas</p>
            <div class="setting-row" id="theme-picker-colors">
                <button class="btn" data-theme="">Default</button>
                <button class="btn" data-theme="dark">Dark</button>
            </div>
        </div>

        <div id="theme-group-images">
            <p class="settings-group-label">Gallery Cards</p>
            <div class="setting-row" id="theme-picker-images">
                <button class="btn" data-theme="web-warriors">Web Warriors</button>
                <button class="btn" data-theme="star-turn">Star Turn</button>
                <button class="btn" data-theme="plans-within-plans">Plans Within Plans</button>
                <button class="btn" data-theme="regenesis">Regenesis</button>
                <button class="btn" data-theme="inner-devil">Inner Devil</button>
            </div>
        </div>
    </div>

</div>

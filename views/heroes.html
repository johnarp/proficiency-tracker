<div id="hero-controls">
    <label>
        Role:
        <select id="ctrl-role">
            <option value="all">All</option>
            <option value="Vanguard">Vanguard</option>
            <option value="Duelist">Duelist</option>
            <option value="Strategist">Strategist</option>
        </select>
    </label>
    <label>
        Sort:
        <select id="ctrl-sort">
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="rank-desc">Rank High–Low</option>
            <option value="rank-asc">Rank Low–High</option>
        </select>
    </label>
    <label>
        Size:
        <select id="ctrl-size">
            <option value="sm">S</option>
            <option value="md">M</option>
            <option value="lg">L</option>
        </select>
    </label>
</div>

<div id="heroes-grid" role="list" aria-label="Hero roster"></div>

<!-- Rank modal -->
<div id="hero-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-hero-name">
    <div id="hero-modal-inner">
        <button id="modal-close" aria-label="Close">Close</button>
        <h3 id="modal-hero-name"></h3>
        <label>
            Rank:
            <select id="modal-rank-select" aria-label="Rank">
                <!-- Populated from ranks.json by heroes.js -->
            </select>
        </label>
        <label>
            Level:
            <select id="modal-level-select" aria-label="Level">
                <!-- Populated when rank is selected -->
            </select>
        </label>
    </div>
</div>

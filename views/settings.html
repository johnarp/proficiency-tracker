<div class="view-settings">

    <div class="settings-section">
        <h2 class="settings-section-title">Data</h2>
        <div class="setting-row">
            <button class="btn" id="btn-export">Export</button>
            <button class="btn" id="btn-import">Import</button>
            <button class="btn danger" id="btn-clear">Clear All</button>
            <input type="file" id="import-file" accept=".json" style="display:none">
        </div>
    </div>

    <div class="settings-section">
        <h2 class="settings-section-title">Info</h2>
        <div class="setting-row">
            <button class="btn" id="btn-profile">View Profile</button>
            <button class="btn" id="btn-credits">View Credits</button>
        </div>
    </div>

    <div class="settings-section">
        <h2 class="settings-section-title">About</h2>
        <div id="meta-info">
            <!-- Populated by settings.js via meta.json -->
        </div>
    </div>

</div>
